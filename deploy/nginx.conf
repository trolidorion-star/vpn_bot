# /etc/nginx/sites-available/bobrik-miniapp.conf
# Telegram webhook source ranges (official docs):
# 149.154.160.0/20
# 91.108.4.0/22

upstream bobrik_miniapp_backend {
    server 127.0.0.1:8090;
    keepalive 32;
}

upstream bobrik_admin_backend {
    server 127.0.0.1:8091;
    keepalive 8;
}

upstream bobrik_platega_webhook {
    server 127.0.0.1:8082;
    keepalive 8;
}

server {
    listen 80;
    server_name your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;

    client_max_body_size 10m;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 149.154.160.0/20;
    set_real_ip_from 91.108.4.0/22;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header Connection "";

    location = /webhook/platega {
        proxy_pass http://bobrik_platega_webhook;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /admin/ {
        proxy_pass http://bobrik_admin_backend/;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/ {
        proxy_pass http://bobrik_miniapp_backend;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        proxy_pass http://bobrik_miniapp_backend;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
