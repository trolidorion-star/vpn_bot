<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bobrik Mini App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0b0b0b",
            panel: "#171717",
            panelSoft: "#1f1f1f",
            accent: "#ffcc00",
            text: "#f4f4f5",
            muted: "#a1a1aa"
          },
          borderRadius: {
            xl2: "20px"
          }
        }
      }
    }
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-bg text-text min-h-screen">
  <div id="root" class="min-h-screen"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const METHODS = [
      { code: "sbp", label: "СБП" },
      { code: "card", label: "Карта РФ" },
      { code: "crypto", label: "Криптовалюта" },
    ];

    async function api(path, { method = "GET", token, body } = {}) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        throw new Error(data.detail || data.error || `HTTP ${res.status}`);
      }
      return data;
    }

    function StatusBadge({ status }) {
      const active = status === "active";
      return (
        <span className={`px-3 py-1 rounded-full text-xs font-semibold ${active ? "bg-emerald-700/40 text-emerald-300" : "bg-red-700/40 text-red-300"}`}>
          {active ? "Активен" : "Истек"}
        </span>
      );
    }

    function App() {
      const [tab, setTab] = useState("home");
      const [token, setToken] = useState("");
      const [user, setUser] = useState(null);
      const [tariffs, setTariffs] = useState([]);
      const [selectedTariff, setSelectedTariff] = useState(null);
      const [loading, setLoading] = useState(true);
      const [ruBypass, setRuBypass] = useState(false);
      const [busy, setBusy] = useState(false);

      useEffect(() => {
        (async () => {
          try {
            const initData = tg?.initData || "";
            const session = await api("/api/auth/session", { method: "POST", body: { initData } });
            setToken(session.token);
            setUser(session.user);

            const tariffRes = await api("/api/get_tariffs", { token: session.token });
            setTariffs(tariffRes.data || []);
          } catch (e) {
            alert(`Ошибка Mini App: ${e.message}`);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      const hasKey = useMemo(() => Boolean(user?.key), [user]);

      async function refreshUser() {
        if (!token) return;
        const res = await api("/api/get_user_info", { token });
        setUser(res.data);
      }

      async function createInvoice(method) {
        if (!selectedTariff) return;
        setBusy(true);
        try {
          const res = await api("/api/create_invoice", {
            method: "POST",
            token,
            body: { tariff_id: selectedTariff.id, method, key_id: user?.key_id || null },
          });
          setSelectedTariff(null);
          window.open(res.data.redirect_url, "_blank");
        } catch (e) {
          alert(e.message);
        } finally {
          setBusy(false);
        }
      }

      async function toggleRuBypass(next) {
        if (!user?.key_id) {
          alert("Сначала создайте ключ");
          return;
        }
        setBusy(true);
        try {
          await api("/api/set_ru_bypass", {
            method: "POST",
            token,
            body: { key_id: user.key_id, enabled: next },
          });
          setRuBypass(next);
        } catch (e) {
          alert(e.message);
        } finally {
          setBusy(false);
        }
      }

      async function copyKey() {
        if (!user?.key) return;
        try {
          await navigator.clipboard.writeText(user.key);
          if (tg?.showPopup) tg.showPopup({ title: "Готово", message: "Ключ скопирован", buttons: [{ type: "ok" }] });
        } catch (e) {
          alert("Не удалось скопировать ключ");
        }
      }

      if (loading) {
        return <div className="p-6 text-center text-muted">Загрузка...</div>;
      }

      return (
        <div className="min-h-screen bg-gradient-to-b from-bg via-[#101010] to-bg px-4 pb-24 pt-5">
          <div className="mb-4 rounded-xl2 bg-panel p-4 border border-zinc-800">
            <div className="text-sm text-muted">Bobrik VPN Mini App</div>
            <div className="mt-1 text-2xl font-semibold">{user?.balance_rub?.toFixed?.(2) || "0.00"} ₽</div>
          </div>

          {tab === "home" && (
            <section className="space-y-3">
              <div className="rounded-xl2 bg-panel p-4 border border-zinc-800">
                <div className="flex items-center justify-between">
                  <h2 className="text-lg font-semibold">Ваш доступ</h2>
                  <StatusBadge status={user?.status} />
                </div>
                <div className="mt-3 text-muted">Осталось дней: <span className="text-text font-medium">{user?.days_left ?? 0}</span></div>
                <button
                  onClick={copyKey}
                  disabled={!hasKey}
                  className="mt-4 w-full rounded-xl2 bg-accent py-3 font-semibold text-black disabled:opacity-40"
                >
                  Скопировать ключ
                </button>
              </div>
            </section>
          )}

          {tab === "shop" && (
            <section className="space-y-3">
              {tariffs.map((tariff) => (
                <button
                  key={tariff.id}
                  className="w-full rounded-xl2 bg-panel p-4 border border-zinc-800 text-left"
                  onClick={() => setSelectedTariff(tariff)}
                >
                  <div className="flex items-center justify-between">
                    <span className="text-lg font-medium">{tariff.name}</span>
                    <span className="text-accent font-semibold">{tariff.price_rub} ₽</span>
                  </div>
                  <div className="mt-1 text-sm text-muted">{tariff.days} дней</div>
                </button>
              ))}
            </section>
          )}

          {tab === "settings" && (
            <section className="rounded-xl2 bg-panel p-4 border border-zinc-800">
              <div className="flex items-center justify-between">
                <div>
                  <div className="font-semibold">RU Bypass</div>
                  <div className="text-sm text-muted">Добавляет/убирает RU-домены из исключений</div>
                </div>
                <button
                  onClick={() => toggleRuBypass(!ruBypass)}
                  disabled={busy}
                  className={`h-8 w-14 rounded-full transition ${ruBypass ? "bg-accent" : "bg-zinc-700"}`}
                >
                  <span className={`block h-6 w-6 rounded-full bg-white transition ${ruBypass ? "translate-x-7" : "translate-x-1"}`}></span>
                </button>
              </div>
            </section>
          )}

          <nav className="fixed bottom-3 left-0 right-0 mx-auto flex w-[calc(100%-24px)] max-w-md justify-between rounded-xl2 bg-panelSoft px-4 py-3 border border-zinc-800">
            <button className={tab === "home" ? "text-accent" : "text-muted"} onClick={() => setTab("home")}>Главная</button>
            <button className={tab === "shop" ? "text-accent" : "text-muted"} onClick={() => setTab("shop")}>Магазин</button>
            <button className={tab === "settings" ? "text-accent" : "text-muted"} onClick={() => setTab("settings")}>Настройки</button>
          </nav>

          {selectedTariff && (
            <div className="fixed inset-0 z-20 bg-black/60" onClick={() => setSelectedTariff(null)}>
              <div className="absolute bottom-0 left-0 right-0 rounded-t-[24px] bg-panel p-4 border-t border-zinc-700" onClick={(e) => e.stopPropagation()}>
                <div className="mx-auto mb-3 h-1.5 w-12 rounded-full bg-zinc-600"></div>
                <div className="text-lg font-semibold">{selectedTariff.name}</div>
                <div className="mb-3 text-sm text-muted">{selectedTariff.days} дней · {selectedTariff.price_rub} ₽</div>
                <div className="space-y-2">
                  {METHODS.map((m) => (
                    <button
                      key={m.code}
                      onClick={() => createInvoice(m.code)}
                      disabled={busy}
                      className="w-full rounded-xl2 border border-zinc-700 px-4 py-3 text-left"
                    >
                      {m.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
