<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071018" />
  <title>Bobrik Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: 'var(--tg-bg-color, #071018)',
            surface: 'var(--tg-secondary-bg-color, #0e1a26)',
            surfaceSoft: '#132233',
            text: 'var(--tg-text-color, #e9f2ff)',
            muted: 'var(--tg-hint-color, #8da4bf)',
            accent: 'var(--tg-link-color, #44b3ff)',
            ok: '#21c98a',
            danger: '#ff6b6b',
            warning: '#ffb04d'
          },
          borderRadius: {
            card: '22px'
          }
        }
      }
    };
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --panel-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      --font-ui: "Manrope", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --font-mono: "JetBrains Mono", "Cascadia Mono", "Fira Code", monospace;
      --focus-ring: 0 0 0 2px rgba(68, 179, 255, 0.45);
    }
    html, body {
      background: radial-gradient(circle at 20% -10%, #194266 0%, #071018 42%), var(--tg-bg-color, #071018);
      min-height: 100%;
      font-family: var(--font-ui);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      letter-spacing: 0.01em;
    }
    *:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }
    .readable {
      line-height: 1.4;
      text-wrap: balance;
    }
    .app-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      contain: strict;
    }
    .app-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(42px);
      opacity: .33;
    }
    .app-orb.one {
      width: 260px;
      height: 260px;
      background: #1a77bd;
      top: -80px;
      left: -70px;
    }
    .app-orb.two {
      width: 220px;
      height: 220px;
      background: #2ba87d;
      right: -80px;
      top: 180px;
    }
    .scene-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .34;
      transition: opacity .3s ease;
    }
    .scene-layer.dashboard {
      background: radial-gradient(45% 35% at 82% 15%, rgba(68,179,255,.35), transparent 70%);
    }
    .scene-layer.plans {
      background: radial-gradient(42% 30% at 20% 10%, rgba(255,176,77,.25), transparent 72%);
    }
    .scene-layer.usage {
      background: transparent;
    }
    .scene-layer.ref {
      background: radial-gradient(40% 30% at 10% 55%, rgba(255,196,107,.24), transparent 72%);
    }
    .scene-layer.support {
      background: radial-gradient(44% 30% at 25% 78%, rgba(160,120,255,.22), transparent 70%);
    }
    .scene-layer.diag {
      background: radial-gradient(48% 35% at 80% 55%, rgba(255,107,107,.22), transparent 75%);
    }
    .scene-layer.service {
      background: radial-gradient(42% 34% at 84% 28%, rgba(110,226,255,.2), transparent 74%);
    }
    .glass {
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      background: linear-gradient(145deg, rgba(17,31,45,0.92), rgba(12,24,37,0.94));
      background-size: 180% 180%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    @keyframes glassShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .premium-card {
      box-shadow: var(--panel-shadow);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
      content-visibility: visible;
      transform: translateZ(0);
      backface-visibility: hidden;
      contain: paint;
    }
    .premium-card:hover {
      border-color: rgba(68,179,255,.45);
      box-shadow: 0 14px 44px rgba(22, 106, 161, .24);
    }
    .premium-card:active {
      transform: scale(.995);
    }
    .hero-glow {
      position: relative;
      overflow: hidden;
    }
    .hero-glow::after {
      content: "";
      position: absolute;
      inset: -40% -10%;
      background: radial-gradient(circle, rgba(68,179,255,.26) 0%, rgba(68,179,255,0) 65%);
      animation: heroPulse 3.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes heroPulse {
      0% { opacity: .2; transform: scale(.95); }
      50% { opacity: .48; transform: scale(1.05); }
      100% { opacity: .2; transform: scale(.95); }
    }
    .animate-in {
      animation: appFadeIn .24s ease-out;
    }
    @keyframes appFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #21c98a;
      box-shadow: 0 0 0 rgba(33,201,138,.7);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(33,201,138,.65); }
      70% { box-shadow: 0 0 0 8px rgba(33,201,138,0); }
      100% { box-shadow: 0 0 0 0 rgba(33,201,138,0); }
    }
    .modal-sheet {
      animation: sheetIn .22s ease-out;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
    @keyframes sheetIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-rise {
      animation: cardRise .28s ease-out;
    }
    @keyframes cardRise {
      from { opacity: .7; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .shine {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .shine::before {
      content: "";
      position: absolute;
      inset: -140% -50%;
      background: linear-gradient(120deg, rgba(255,255,255,0.00) 20%, rgba(255,255,255,0.11) 50%, rgba(255,255,255,0.00) 80%);
      transform: translateX(-55%);
      animation: shineSweep 6.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes shineSweep {
      0% { transform: translateX(-58%) rotate(8deg); opacity: 0; }
      18% { opacity: 1; }
      55% { opacity: 1; }
      100% { transform: translateX(58%) rotate(8deg); opacity: 0; }
    }
    .tag {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--tg-hint-color, #8da4bf);
      letter-spacing: .03em;
    }
    .traffic-track {
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .traffic-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #21c98a 0%, #44b3ff 100%);
      transition: width .3s ease;
    }
    .usage-traffic-fill {
      background: linear-gradient(90deg, #21c98a 0%, #38d39f 100%);
    }
    .usage-key-card {
      background: linear-gradient(145deg, rgba(16, 28, 40, 0.85), rgba(11, 21, 33, 0.88));
    }
    .tab-dashboard .premium-card,
    .tab-plans .premium-card {
      contain: layout style;
    }
    .scroll-optimizing.tab-dashboard .glass,
    .scroll-optimizing.tab-plans .glass {
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
    }
    .scroll-optimizing.tab-dashboard .shine::before,
    .scroll-optimizing.tab-plans .shine::before {
      animation-play-state: paused;
      opacity: .42;
    }
    .scroll-optimizing.tab-dashboard .hero-glow::after,
    .scroll-optimizing.tab-plans .hero-glow::after {
      animation-play-state: paused;
      opacity: .2;
    }
    .scroll-optimizing.tab-dashboard .app-orb,
    .scroll-optimizing.tab-plans .app-orb {
      filter: blur(24px);
      opacity: .2;
    }
    .tab-usage .hero-glow::after,
    .tab-usage .shine::before,
    .tab-usage .card-rise,
    .tab-usage .animate-in {
      animation: none !important;
    }
    .perf-low .glass {
      backdrop-filter: none;
      background: linear-gradient(145deg, rgba(15, 27, 40, 0.98), rgba(12, 23, 34, 0.98));
      animation: none !important;
    }
    .perf-low .hero-glow::after,
    .perf-low .shine::before,
    .perf-low .app-orb {
      animation: none !important;
      opacity: .15 !important;
    }
    .perf-low .premium-card {
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .mobile-stable .glass {
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      backface-visibility: hidden;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    .mobile-stable .app-orb {
      filter: blur(28px);
      opacity: .24;
    }
    .mobile-stable .scene-layer {
      transition: none;
    }
    .mobile-stable .hero-glow::after {
      animation-duration: 5.8s;
      opacity: .26;
    }
    .mobile-stable .shine::before {
      animation-duration: 9.5s;
      inset: -120% -40%;
      opacity: .65;
    }
    .mobile-stable .tab-motion,
    .mobile-stable .animate-in,
    .mobile-stable .card-rise {
      animation-duration: .18s;
    }
    .reduced-motion * {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    .mono {
      font-family: var(--font-mono);
      letter-spacing: .01em;
    }
    .tab-motion {
      animation: tabEnter .23s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes tabEnter {
      from { opacity: .01; transform: translateY(10px) scale(.992); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .skeleton {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      border-radius: 12px;
    }
    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent);
      animation: sk 1.2s infinite;
    }
    @keyframes sk { to { transform: translateX(100%); } }
    .theme-chip {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 4px 8px;
      font-size: 11px;
      line-height: 1;
    }
    @media (max-width: 420px) {
      .premium-card { content-visibility: visible; }
      .app-orb.one { width: 210px; height: 210px; }
      .app-orb.two { width: 180px; height: 180px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .glass,
      .hero-glow::after,
      .shine::before,
      .pulse-dot,
      .animate-in,
      .card-rise,
      .modal-sheet {
        animation: none !important;
      }
    }
    .theme-light body {
      background: radial-gradient(circle at 20% -10%, #d7ecff 0%, #eef5fb 42%), #eef5fb;
      color: #10253a;
    }
    .theme-light .glass {
      background: linear-gradient(145deg, rgba(255,255,255,0.94), rgba(246,250,255,0.95));
      border: 1px solid rgba(12, 32, 52, 0.09);
      box-shadow: 0 10px 30px rgba(17, 53, 95, 0.14);
    }
    .theme-light .premium-card:hover {
      border-color: rgba(22,104,216,.38);
      box-shadow: 0 12px 34px rgba(22,104,216,.16);
    }
    .theme-light .tag {
      border-color: rgba(22, 104, 216, .28);
      background: rgba(22, 104, 216, .06);
      color: #36506f;
    }
    .theme-light .traffic-track {
      background: rgba(7, 32, 55, .10);
    }
    .theme-light .app-orb.one { background: #9ed0ff; }
    .theme-light .app-orb.two { background: #89dec0; }
    .theme-light .pulse-dot { background: #1f9c73; }
    .theme-light .text-muted { color: #5f7187 !important; }
    .theme-light .text-text { color: #10253a !important; }
    .theme-light .theme-chip {
      border-color: rgba(12,32,52,.2);
      background: rgba(12,32,52,.05);
      color: #3d556f;
    }
    .theme-light .border-white\/10,
    .theme-light .border-white\/15 {
      border-color: rgba(12, 32, 52, 0.14) !important;
    }
    .theme-light .bg-surface,
    .theme-light .bg-surfaceSoft,
    .theme-light .bg-surfaceSoft\/45,
    .theme-light .bg-surfaceSoft\/50,
    .theme-light .bg-surfaceSoft\/55,
    .theme-light .bg-surfaceSoft\/60,
    .theme-light .bg-surfaceSoft\/70 {
      background-color: rgba(228, 238, 248, 0.82) !important;
      color: #10253a !important;
    }
    .chart-grid-line {
      stroke: rgba(255,255,255,.14);
      stroke-width: .45;
      stroke-dasharray: 1.4 1.6;
    }
    .chart-axis-label {
      font-size: 2.8px;
      fill: rgba(201, 219, 238, .75);
      letter-spacing: .02em;
    }
    .theme-light .chart-axis-label {
      fill: rgba(51, 79, 110, .74);
    }
    .chart-stat-chip {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--tg-hint-color, #8da4bf);
    }
    .theme-light .chart-stat-chip {
      border-color: rgba(12, 32, 52, 0.16);
      background: rgba(12, 32, 52, 0.03);
      color: #4f6782;
    }
    .soft-input {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      width: 100%;
      outline: none;
    }
    .theme-light .soft-input {
      border-color: rgba(12, 32, 52, 0.16);
      background: rgba(12, 32, 52, 0.03);
      color: #10253a;
    }
    .desktop-grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .desktop-modal {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }
    .nav-badge {
      position: absolute;
      right: 2px;
      top: 2px;
      min-width: 18px;
      border-radius: 999px;
      background: #ff6b6b;
      padding: 2px 6px;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      color: #fff;
      z-index: 2;
    }
    @media (min-width: 960px) {
      .desktop-grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 430px) {
      .glass {
        backdrop-filter: blur(7px);
      }
      .premium-card {
        box-shadow: 0 7px 18px rgba(0, 0, 0, 0.24);
      }
    }
    @media (max-width: 768px) {
      .glass {
        backdrop-filter: blur(8px);
      }
    }
  </style>
</head>
<body class="text-text">
  <div id="root" class="min-h-screen"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      const root = document.documentElement;
      const tp = tg.themeParams || {};
      if (tp.bg_color) root.style.setProperty('--tg-bg-color', tp.bg_color);
      if (tp.secondary_bg_color) root.style.setProperty('--tg-secondary-bg-color', tp.secondary_bg_color);
      if (tp.text_color) root.style.setProperty('--tg-text-color', tp.text_color);
      if (tp.hint_color) root.style.setProperty('--tg-hint-color', tp.hint_color);
      if (tp.link_color) root.style.setProperty('--tg-link-color', tp.link_color);
    }

    const PAY_METHODS = [
      { code: 'sbp', title: 'СБП', hint: 'Мгновенно' },
      { code: 'card', title: 'Карта РФ', hint: 'Банковские карты' },
      { code: 'crypto', title: 'Криптовалюта', hint: 'USDT и крипто-методы' },
    ];

    function PaymentMethodIcon({ code }) {
      const common = { className: 'h-5 w-5', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '1.8', strokeLinecap: 'round', strokeLinejoin: 'round' };
      if (code === 'card') {
        return (
          <svg {...common}>
            <rect x="2.5" y="5" width="19" height="14" rx="2.5"></rect>
            <path d="M2.5 9.5h19"></path>
            <path d="M6.5 14.5h4"></path>
          </svg>
        );
      }
      if (code === 'crypto') {
        return (
          <svg {...common}>
            <circle cx="12" cy="12" r="8.5"></circle>
            <path d="M10.2 8.8h3.1a1.8 1.8 0 1 1 0 3.6h-2.9a1.8 1.8 0 1 0 0 3.6h3.3"></path>
            <path d="M12 7.2v9.6"></path>
          </svg>
        );
      }
      return (
        <svg {...common}>
          <path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"></path>
        </svg>
      );
    }

    const LOGO_SRC = './assets/logo-bobrik.jpg';
    const CACHE_KEY = 'bobrik-miniapp-cache-v8';
    const CACHE_PERSIST_KEY = 'bobrik-miniapp-cache-persist-v8';
    const USAGE_HISTORY_KEY = 'bobrik-miniapp-usage-history-v1';
    const SUPPORT_SEEN_KEY = 'bobrik-miniapp-support-seen-v1';
    const SUPPORT_TICKET_SEEN_KEY = 'bobrik-miniapp-support-ticket-seen-v1';
    const PERF_MODE_KEY = 'bobrik-miniapp-performance-mode-v1';
    const REDUCED_MOTION_KEY = 'bobrik-miniapp-reduced-motion-v1';
    const COMPACT_LISTS_KEY = 'bobrik-miniapp-compact-lists-v1';
    const THEME_VARIANT_KEY = 'bobrik-miniapp-theme-variant-v1';
    const PENDING_PAYMENT_KEY = 'bobrik-miniapp-pending-payment-v1';
    const SUPPORT_QUICK_ISSUES = [
      'Проблема с подключением',
      'Не обновляется подписка после оплаты',
      'Нужна помощь с настройкой клиента',
      'Не работает ключ на устройстве',
    ];
    const INSTALL_PLATFORMS = [
      { id: 'ios', title: 'iOS' },
      { id: 'android', title: 'Android' },
      { id: 'windows', title: 'Windows' },
      { id: 'macos', title: 'macOS' },
      { id: 'linux', title: 'Linux' },
    ];
    const INSTALL_LINKS = {
      ios: {
        store: 'https://apps.apple.com/app/happ-proxy-utility/id6504287215',
        alt: 'https://github.com/Epodonios/happ/releases',
      },
      android: {
        store: 'https://play.google.com/store/apps/details?id=com.happproxy',
        alt: 'https://github.com/Epodonios/happ/releases',
      },
      windows: {
        store: 'https://github.com/Epodonios/happ/releases',
        alt: 'https://github.com/Epodonios/happ/releases',
      },
      macos: {
        store: 'https://github.com/Epodonios/happ/releases',
        alt: 'https://github.com/Epodonios/happ/releases',
      },
      linux: {
        store: 'https://github.com/Epodonios/happ/releases',
        alt: 'https://github.com/Epodonios/happ/releases',
      },
    };

    const getSavedFlag = (key, fallback = false) => {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null) return fallback;
        return raw === '1';
      } catch {
        return fallback;
      }
    };

    const setSavedFlag = (key, value) => {
      try {
        localStorage.setItem(key, value ? '1' : '0');
      } catch {}
    };

    const getSavedValue = (key, fallback = '') => {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === undefined || raw === '') return fallback;
        return raw;
      } catch {
        return fallback;
      }
    };

    const setSavedValue = (key, value) => {
      try {
        localStorage.setItem(key, String(value ?? ''));
      } catch {}
    };

    const getSavedJson = (key, fallback = {}) => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : fallback;
      } catch {
        return fallback;
      }
    };

    const setSavedJson = (key, value) => {
      try {
        localStorage.setItem(key, JSON.stringify(value || {}));
      } catch {}
    };

    const loadPendingPayment = () => {
      try {
        const raw = localStorage.getItem(PENDING_PAYMENT_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const orderId = String(parsed.order_id || '').trim();
        if (!orderId) return null;
        return parsed;
      } catch {
        return null;
      }
    };

    const savePendingPayment = (payload) => {
      try {
        if (!payload) {
          localStorage.removeItem(PENDING_PAYMENT_KEY);
          return;
        }
        localStorage.setItem(PENDING_PAYMENT_KEY, JSON.stringify(payload));
      } catch {}
    };

    const readUsageHistory = () => getSavedJson(USAGE_HISTORY_KEY, {});

    const appendUsageHistory = (items = []) => {
      if (!Array.isArray(items) || items.length === 0) return;
      const nowTs = Date.now();
      const oneWeekMs = 7 * 24 * 60 * 60 * 1000;
      const history = readUsageHistory();
      for (const item of items) {
        const keyId = Number(item?.id || 0);
        if (!keyId) continue;
        const used = Number(item?.traffic_used_bytes || 0);
        const limit = Number(item?.traffic_limit_bytes || 0);
        if (!Number.isFinite(used) || used < 0) continue;
        const bucket = Array.isArray(history[String(keyId)]) ? history[String(keyId)] : [];
        const prev = bucket[bucket.length - 1];
        if (!prev || Math.abs(Number(prev.used || 0) - used) > 1024 * 64 || (nowTs - Number(prev.ts || 0)) > 1000 * 60 * 3) {
          bucket.push({ ts: nowTs, used, limit });
        }
        history[String(keyId)] = bucket
          .filter((row) => (nowTs - Number(row.ts || 0)) <= oneWeekMs)
          .slice(-96);
      }
      setSavedJson(USAGE_HISTORY_KEY, history);
    };

    const detectLowEndDevice = () => {
      const memory = Number(navigator.deviceMemory || 0);
      const cores = Number(navigator.hardwareConcurrency || 0);
      const saveData = Boolean(navigator.connection?.saveData);
      const reduced = window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches;
      return saveData || reduced || (memory > 0 && memory <= 2) || (cores > 0 && cores <= 4);
    };
    const detectMobileStableMode = () => {
      const coarse = window.matchMedia?.('(pointer: coarse)')?.matches;
      const touch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      return Boolean(coarse || touch);

        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') return parsed;
        }
      } catch {}
      try {
        const raw = localStorage.getItem(CACHE_PERSIST_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const ts = Number(parsed?.saved_at || 0);
        if (!ts || (now() - ts) > 1000 * 60 * 60 * 24) return null;
        return parsed?.payload && typeof parsed.payload === 'object' ? parsed.payload : null;
      } catch {
        return null;
      }
      return null;
    };

    const saveCache = (payload) => {
      try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(payload));
      } catch {}
      try {
        localStorage.setItem(CACHE_PERSIST_KEY, JSON.stringify({ saved_at: now(), payload }));
      } catch {}
    };

    async function requestJson(path, { method = 'GET', token, body } = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const response = await fetch(path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await response.json().catch(() => ({}));
      return { ok: response.ok, status: response.status, data };
    }

    async function api(path, opts = {}) {
      const { ok, status, data } = await requestJson(path, opts);
      if (!ok || data.ok === false) {
        throw new ApiError(data.detail || data.error || `HTTP ${status}`, status, data);
      }
      return data;
    }

    const normalizeApiError = (error) => {
      const raw = String(error?.message || '').trim();
      if (!raw) return 'Ошибка сервиса. Попробуйте позже.';
      if (raw.includes('Failed to create Platega link') || raw.includes('Platega create payment failed')) {
        return 'Не удалось создать ссылку на оплату. Попробуйте другой способ или повторите позже.';

      if (raw.includes('Payment method is disabled')) return 'Этот способ оплаты временно отключен.';
      if (raw.includes('Unsupported payment method')) return 'Способ оплаты не поддерживается.';
      return raw;
    };

    const fmtMoney = (value) => `${(Number(value) || 0).toFixed(2)} ₽`;
    const fmtBytes = (value) => {
      const num = Number(value) || 0;
      if (num <= 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let idx = 0;
      let n = num;
      while (n >= 1024 && idx < units.length - 1) {
        n /= 1024;
        idx += 1;
      }
      const prec = n >= 100 ? 0 : (n >= 10 ? 1 : 2);
      return `${n.toFixed(prec)} ${units[idx]}`;
    };
    const pct = (used, limit) => {
      const u = Number(used) || 0;
      const l = Number(limit) || 0;
      if (l <= 0) return 0;
      return Math.max(0, Math.min(100, Math.round((u / l) * 100)));
    };
    const fmtDate = (raw) => {
      if (!raw) return 'Не задано';
      const dt = new Date(raw);
      if (Number.isNaN(dt.getTime())) return 'Не задано';
      return dt.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

    const fmtCountdown = (ms) => {
      if (ms <= 0) return '00:00:00';
      const total = Math.floor(ms / 1000);
      const hh = Math.floor(total / 3600);
      const mm = Math.floor((total % 3600) / 60);
      const ss = total % 60;
      return [hh, mm, ss].map((x) => String(x).padStart(2, '0')).join(':');
    };

        const code = start.replace(/^ref_?/, '');
        return code ? `https://t.me/${bot}?start=ref${code}` : `https://t.me/${bot}`;

      async function authWithRetry(initData, retries = 2) {
        let last = { status: 0, detail: 'Auth failed' };
        for (let i = 0; i <= retries; i++) {
          try {
            const response = await requestJson('/api/auth/session', { method: 'POST', body: { initData } });
            if (response.ok && response.data?.ok !== false && response.data?.token) {
              return { ok: true, payload: response.data };
            }
            last = { status: response.status, detail: response.data?.detail || `HTTP ${response.status}` };
            if (response.status === 503) return { ok: false, error: last };
          } catch (error) {
            last = { status: 0, detail: error?.message || 'Network error' };
          }
          if (i < retries) await sleep(280 * (i + 1));
        }
        return { ok: false, error: last };

          if (u.status === 'fulfilled') setUser(u.value.data);
          if (k.status === 'fulfilled') {
            const keyRows = k.value.data || [];
            setKeys(keyRows);
            appendUsageHistory(keyRows);
          }
          if (t.status === 'fulfilled') setTariffs(t.value.data || []);
          if (s.status === 'fulfilled') setStats(s.value.data || []);
          if (r.status === 'fulfilled') setRefData(r.value.data || null);
          if (sup.status === 'fulfilled') {
            const supData = sup.value.data || {};
            const currentTicket = supData?.ticket || null;
            setSupportTicket(currentTicket);
            const messages = sup.value.data?.messages || [];
            setSupportMessages(messages);
            setSupportHistory(supData?.history || []);
            setSupportClosedTickets(supData?.closed_tickets || []);
            setSupportAdminHistory(supData?.admin_history || []);
            const isAdminNow = Boolean((u.status === 'fulfilled' ? u.value?.data?.is_admin : user?.is_admin));
            const historyItems = isAdminNow ? (supData?.admin_history || []) : (supData?.closed_tickets || supData?.history || []);
            const unreadByTicket = {};
            for (const item of historyItems) {
              const tid = Number(item?.id || 0);
              if (!tid) continue;
              const seenAt = Number((ticketSeenMap || {})[String(tid)] || 0);
              const updAt = new Date(item?.updated_at || 0).getTime() || 0;
              if (updAt > seenAt) unreadByTicket[String(tid)] = 1;
            }
            if (currentTicket?.id) {
              const tid = Number(currentTicket.id);
              const seenAt = Number((ticketSeenMap || {})[String(tid)] || 0);
              const hasUnreadInOpen = (messages || []).some((m) => {
                const isIncoming = isAdminNow ? String(m?.sender_role) === 'user' : String(m?.sender_role) === 'admin';
                const msgAt = new Date(m?.created_at || 0).getTime() || 0;
                return isIncoming && msgAt > seenAt;
              });
              if (hasUnreadInOpen) unreadByTicket[String(tid)] = Math.max(1, Number(unreadByTicket[String(tid)] || 0));
            }
            setSupportUnreadByTicket(unreadByTicket);
            if (!isAdminNow) {
              const seen = Number(localStorage.getItem(SUPPORT_SEEN_KEY) || 0);
              const unread = messages.filter((m) => String(m?.sender_role) === 'admin' && Number(m?.id || 0) > seen).length;
              setSupportUnread(Math.max(0, unread + Object.keys(unreadByTicket).length));
            } else {
              const seen = Number(localStorage.getItem(SUPPORT_SEEN_KEY) || 0);
              const unread = messages.filter((m) => String(m?.sender_role) === 'user' && Number(m?.id || 0) > seen).length;
              setSupportUnread(Math.max(0, unread + Object.keys(unreadByTicket).length));
            }
          }

          if (promo.status === 'fulfilled') {
            const promoData = promo.value.data || {};

            setActivePromo(active || null);

            if (!active?.code && globalPromo?.active && globalPromo?.code && !promoCodeDraft) {
              setPromoCodeDraft(String(globalPromo.code || '').trim().toUpperCase());
            }
          }

          const failures = [u, k, t, s, r, sup, promo].filter((x) => x.status === 'rejected').map((x) => x.reason);
          if (failures.some((err) => err?.status === 503)) {
            setMaintenance(true);
            return;

          setOfflineMode(false);
          setLastSyncAt(now());

          if (failures.length && !silent) {
            showToast('Часть данных не обновилась', 'error');
          }
        } catch (error) {
          if (String(error?.message || '').toLowerCase().includes('network') || String(error?.message || '').toLowerCase().includes('fetch')) {
            setOfflineMode(true);
          }
          if (!silent) showToast(error?.message || 'Ошибка обновления', 'error');
        } finally {
          refreshBusyRef.current = false;
        }

        if (!token || !orderId) return { done: false, paid: false };
        const response = await api(`/api/payment_status/${encodeURIComponent(orderId)}`, { token });
        const data = response.data || {};
        const paid = Boolean(data.is_paid);
        const failed = String(data.transaction_status || '').toUpperCase() === 'FAILED';
        if (paid) {
          const details = {
            order_id: String(data.order_id || orderId),
            key_id: Number(data.key_id || 0) || null,
            key_link: String(data.key_link || '').trim(),
            key_name: String(data.key_name || '').trim(),
            expires_at: data.expires_at || null,
          };
          setPaymentResult(details);
          clearPendingPayment();
          await refreshData(token, { silent: true });
          if (details.key_id) {
            setSelectedKeyId(details.key_id);
          }
          if (!silent) showToast('Оплата подтверждена. Ключ готов.');
          return { done: true, paid: true };
        }
        if (failed) {
          clearPendingPayment();
          if (!silent) showToast('Платеж отменен или отклонен', 'error');
          return { done: true, paid: false };
        }
        return { done: false, paid: false };

          paymentPollTimerRef.current = null;
        }
        setPaymentPolling(true);
        let count = 0;
        const tick = async () => {
          try {
            const result = await pollPaymentStatus(orderId, { silent });
            if (result.done) {
              setPaymentPolling(false);
              return;
            }
          } catch (error) {
            if (!silent) {
              showToast(error?.message || 'Ошибка проверки оплаты', 'error');
            }
          }
          count += 1;
          if (count >= attempts) {
            setPaymentPolling(false);
            if (!silent) showToast('Оплата еще обрабатывается. Обновите через пару секунд.');
            return;
          }
          paymentPollTimerRef.current = setTimeout(tick, intervalMs);
        };
        await tick();
      }

      async function runConnectionDiagnostics() {
        const samples = [];
        for (let i = 0; i < 4; i++) {
          const t0 = now();
          try {
            await requestJson(`/api/app_state?diag=${t0}&i=${i}`);
            samples.push(now() - t0);
          } catch {}
          await sleep(40);
        }
        const sorted = [...samples].sort((a, b) => a - b);
        const pingMs = sorted.length ? sorted[Math.floor(sorted.length / 2)] : null;
        const avg = sorted.length ? Math.round(sorted.reduce((a, b) => a + b, 0) / sorted.length) : null;
        const jitterMs = sorted.length > 1 ? Math.max(...sorted) - Math.min(...sorted) : 0;
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';
        const locale = navigator.language || 'ru-RU';
        const conn = navigator.connection || {};
        const netType = conn.effectiveType || 'unknown';
        const downlink = Number(conn.downlink || 0);
        const nativeRtt = Number(conn.rtt || 0);
        const rtt = nativeRtt > 0 ? nativeRtt : (avg || 0);
        const region = tz ? `Устройство (${tz})` : 'По данным устройства';
        const preset = (performanceMode || isLowEndDevice || netType.includes('2g') || netType.includes('3g'))
          ? 'Эко-профиль: меньше анимаций, стабильность при слабой сети'
          : 'Стандарт-профиль: максимум плавности и визуальных эффектов';
        const report = {
          pingMs,
          avgPingMs: avg,
          jitterMs,
          samples,
          region,
          locale,
          timezone: tz,
          netType,
          downlink,
          rtt,
          preset,
          checkedAt: now(),
        };
        setDiagReport(report);
        return report;
      }

          )}

          <div className="relative z-10 mb-4 rounded-card glass premium-card hero-glow shine p-4">
            <div className="flex items-center gap-3">
              <img
                src={LOGO_SRC}
                alt="Bobrik VPN"
                className="h-14 w-14 rounded-2xl object-cover ring-1 ring-white/15"
                onError={(event) => { event.currentTarget.style.display = 'none'; }}
              />
              <div className="min-w-0">
                <div className="text-xs uppercase tracking-wider text-muted">Bobrik VPN Mini App</div>
                <div className="mt-1 text-2xl font-semibold">{fmtMoney(user?.balance_rub)}</div>
                <div className="mt-1 flex flex-wrap items-center gap-2">
                  <span className="tag">{isActive ? 'Подписка активна' : 'Подписка неактивна'}</span>
                  {(performanceMode || isLowEndDevice) && <span className="tag">Eco mode</span>}
                  <button
                    onClick={impact(() => setThemeVariant('dark'))}
                    className={`theme-chip ${themeVariant === 'dark' ? 'bg-accent text-black border-transparent font-semibold' : ''}`}
                  >
                    Dark
                  </button>
                  <button
                    onClick={impact(() => setThemeVariant('light'))}
                    className={`theme-chip ${themeVariant === 'light' ? 'bg-accent text-black border-transparent font-semibold' : ''}`}
                  >
                    Light
                  </button>
                </div>
              </div>
            </div>
            <div className="mt-3 grid grid-cols-2 gap-2">
              <button onClick={impact(() => changeTab('plans'))} className="rounded-xl border border-white/15 bg-surfaceSoft/60 px-3 py-2 text-xs">Купить тариф</button>
              <button onClick={impact(() => changeTab('support'))} className="rounded-xl border border-white/15 bg-surfaceSoft/60 px-3 py-2 text-xs">Написать в поддержку</button>
            </div>
          </div>

          <div className="relative z-10 tab-motion">
            {tabContentLoading ? (
              <div className="space-y-3">
                <div className="rounded-card glass border border-white/10 p-4"><div className="skeleton h-5 w-2/5"></div><div className="skeleton mt-3 h-10 w-full"></div><div className="skeleton mt-2 h-10 w-full"></div></div>
                <div className="rounded-card glass border border-white/10 p-4"><div className="skeleton h-5 w-1/3"></div><div className="skeleton mt-3 h-24 w-full"></div></div>
              </div>
            ) : renderTabContent()}
          </div>

          <nav className="fixed bottom-3 left-0 right-0 z-20 mx-auto flex w-[calc(100%-20px)] max-w-[520px] items-center gap-2 rounded-2xl border border-white/10 px-2.5 py-2.5 glass" style={{ boxShadow: 'var(--panel-shadow)' }}>
            <div className="flex min-w-0 w-full gap-2 overflow-x-auto overflow-y-visible">
            {primaryTabs.map((item) => (
              <button
                key={item.id}
                onClick={impact(() => changeTab(item.id), 'light')}
                className={`relative whitespace-nowrap rounded-xl px-3 py-2 text-xs sm:text-sm transition overflow-visible ${tab === item.id ? 'bg-accent text-black font-semibold' : 'bg-surfaceSoft/45 text-muted'}`}
              >
                <span className="mr-1">{item.icon}</span>{item.title}
                {Number(item.badge || 0) > 0 && tab !== item.id && (
                  <span className="nav-badge">
                    {item.badge > 99 ? '99+' : item.badge}
                  </span>
                )}
              </button>
            ))}
            </div>
          </nav>

          {extraTabs.length > 0 && (
            <button
              onClick={impact(() => setShowSectionsMenu((v) => !v), 'light')}
              className={`fixed bottom-20 right-4 z-20 rounded-xl border border-white/15 px-3 py-2 text-xs sm:text-sm transition glass ${extraTabs.some((t) => t.id === tab) || showSectionsMenu ? 'bg-accent text-black font-semibold' : 'text-text'}`}
              title="Разделы"
            >
              ⋮
            </button>
          )}

          {showSectionsMenu && (
            <div className="fixed inset-0 z-30 bg-black/50" onClick={() => setShowSectionsMenu(false)}>
              <div className="absolute bottom-0 left-0 right-0 rounded-t-[24px] glass border-t border-white/10 p-4 modal-sheet" onClick={(event) => event.stopPropagation()}>
                <div className="mx-auto mb-3 h-1.5 w-14 rounded-full bg-white/20"></div>
                <div className="mb-2 text-sm font-semibold">Разделы</div>
                <div className="grid grid-cols-2 gap-2">
                  {extraTabs.map((item) => (
                    <button
                      key={item.id}
                      onClick={impact(() => changeTab(item.id), 'light')}
                      className={`relative rounded-xl px-3 py-3 text-left text-sm ${tab === item.id ? 'bg-accent text-black font-semibold' : 'border border-white/15 bg-surfaceSoft/45 text-text'}`}
                    >
                      <span className="mr-1">{item.icon}</span>{item.title}
                      {Number(item.badge || 0) > 0 && tab !== item.id && (
                        <span className="nav-badge">
                          {item.badge > 99 ? '99+' : item.badge}
                        </span>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {selectedTariff && (
            <div className="fixed inset-0 z-30 bg-black/65" onClick={() => setSelectedTariff(null)}>
              <div className="absolute bottom-0 left-0 right-0 rounded-t-[26px] glass border-t border-white/10 p-4 modal-sheet desktop-modal" onClick={(event) => event.stopPropagation()}>
                <div className="mx-auto mb-3 h-1.5 w-14 rounded-full bg-white/20"></div>
                <div className="text-lg font-semibold">{selectedTariff.name}</div>
                <div className="mb-3 text-sm text-muted">
                  {(() => {
                    const daysLabel = (String(selectedTariff?.name || '').toLowerCase().includes('навсегда') || Number(selectedTariff?.days || 0) >= 666)
                      ? '∞'
                      : `${selectedTariff.days} дней`;
                    const basePrice = Number(selectedTariff?.price_rub || 0);
                    const discountPct = (promoGlobal?.active && checkoutUsePromo)
                      ? Number(promoGlobal?.discount_percent || 0)
                      : 0;
                    const finalPrice = discountPct > 0
                      ? Math.max(1, Math.round(basePrice * (100 - discountPct) / 100))
                      : basePrice;
                    if (discountPct > 0 && finalPrice < basePrice) {
                      return <span>{daysLabel} • <s>{basePrice} ₽</s> <span className="text-accent font-semibold">{finalPrice} ₽</span></span>;
                    }
                    return <span>{daysLabel} • {basePrice} ₽</span>;
                  })()}
                </div>
                {promoGlobal?.active && promoGlobal?.code && (
                  <div className="mb-3 text-xs text-muted">
                    Промо-таймер акции: <span className="mono text-text">{fmtCountdown(promoGlobalSecondsLive * 1000)}</span>
                  </div>
                )}
                <div className="rounded-2xl border border-white/10 bg-surfaceSoft/55 p-3">
                  <div className="text-sm font-semibold">Опции покупки</div>
                  <div className="mt-2">
                    <div className="text-xs text-muted">
                      Промокод
                      {promoGlobal?.active && Number(promoGlobal?.discount_percent || 0) > 0 && (
                        <span className="ml-1 inline-block rounded-full border border-accent/30 bg-accent/10 px-1.5 py-0.5 text-[10px] text-accent">
                          -{Math.round(Number(promoGlobal.discount_percent || 0))}%
                        </span>
                      )}
                    </div>
                    <div className="mt-1 flex gap-2">
                      <input
                        value={promoCodeDraft}
                        onChange={(event) => setPromoCodeDraft(event.target.value)}
                        maxLength={32}
                        className="soft-input flex-1"
                        placeholder="Например: BOBRIK2026"
                      />
                      <button
                        onClick={impact(() => {
                          const code = String(promoCodeDraft || '').trim();
                          setPromoCodeApplied(code);
                          setCheckoutUsePromo(Boolean(code));
                          showToast(code ? `Промокод ${code} добавлен` : 'Промокод очищен');
                        }, 'light')}
                        className="rounded-xl border border-white/15 px-3 py-2 text-xs"
                      >
                        Применить
                      </button>
                    </div>
                    {(promoCodeApplied || activePromo?.code) && (
                      <div className="mt-1 text-[11px] text-muted">
                        Активный промокод: {String(promoCodeApplied || activePromo?.code || '').trim().toUpperCase()}
                      </div>
                    )}
                    <div className="mt-2 flex items-center gap-2">
                      <button
                        onClick={impact(() => {
                          setCheckoutUsePromo(false);
                          showToast('Покупка будет без промокода');
                        }, 'light')}
                        className={`rounded-xl px-3 py-2 text-xs transition ${!checkoutUsePromo ? 'bg-surfaceSoft border border-white/20 text-text' : 'border border-white/15 text-muted'}`}
                      >
                        Купить без промокода
                      </button>
                      <button
                        onClick={impact(() => {
                          const code = String(activePromo?.code || promoCodeDraft || promoCodeApplied || '').trim().toUpperCase();
                          if (code) {
                            setPromoCodeDraft(code);
                            setPromoCodeApplied(code);
                          }
                          setCheckoutUsePromo(true);
                          showToast(code ? `Режим с промокодом ${code}` : 'Включен режим с промокодом');
                        }, 'light')}
                        className={`rounded-xl px-3 py-2 text-xs transition ${checkoutUsePromo ? 'bg-accent/18 border border-accent/40 text-accent' : 'border border-white/15 text-muted'}`}
                      >
                        Купить по промокоду
                      </button>
                    </div>
                  </div>
                  <div className="mt-3 rounded-xl border border-white/10 bg-surface/40 p-2.5">
                    <div className="flex items-center justify-between gap-2">
                      <div className="text-xs font-semibold">Купить в подарок</div>
                      <button
                        onClick={impact(() => setGiftMode((v) => !v), 'light')}
                        className={`rounded-lg px-2.5 py-1 text-xs ${giftMode ? 'bg-accent text-black font-semibold' : 'border border-white/15 text-muted'}`}
                      >
                        {giftMode ? 'Вкл' : 'Выкл'}
                      </button>
                    </div>
                    {giftMode && (
                      <div className="mt-2 space-y-2">
                        <input
                          value={giftRecipientName}
                          onChange={(event) => setGiftRecipientName(event.target.value)}
                          maxLength={64}
                          className="soft-input"
                          placeholder="Имя получателя (для открытки)"
                        />
                        <input
                          value={giftComment}
                          onChange={(event) => setGiftComment(event.target.value)}
                          maxLength={120}
                          className="soft-input"
                          placeholder="Короткое пожелание (опционально)"
                        />
                        <div className="text-[11px] text-muted readable">
                          Подарочный сценарий и карточка получателя доступны в основном Telegram-боте.
                        </div>
                        <button
                          onClick={impact(() => tg?.openLink?.('https://t.me/BobrikVPNbot'), 'light')}
                          className="w-full rounded-xl border border-white/15 px-3 py-2 text-xs"
                        >
                          Открыть подарок в боте
                        </button>
                      </div>
                    )}
                  </div>
                </div>
                <div className="space-y-2">
                  {PAY_METHODS.map((method) => (
                    <button key={method.code} onClick={impact(() => createInvoice(method.code), 'medium')} disabled={busy} className="w-full rounded-2xl border border-white/10 bg-surfaceSoft/70 px-4 py-3 text-left transition hover:border-accent/50">
                      <div className="flex items-center gap-3">
                        <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-surfaceSoft/80 text-accent">
                          <PaymentMethodIcon code={method.code} />
                        </div>
                        <div className="min-w-0">
                          <div className="font-medium">{method.title}</div>
                          <div className="text-xs text-muted mt-1">{method.hint}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {selectedKeyId && (
            <div className="fixed inset-0 z-30 bg-black/65" onClick={() => { setSelectedKeyId(null); setSelectedKeyDetails(null); }}>
              <div className="absolute bottom-0 left-0 right-0 rounded-t-[26px] glass border-t border-white/10 p-4 modal-sheet desktop-modal" onClick={(event) => event.stopPropagation()}>
                <div className="mx-auto mb-3 h-1.5 w-14 rounded-full bg-white/20"></div>
                <div className="text-lg font-semibold">{selectedKeyDetails?.display_name || `Ключ #${selectedKeyId}`}</div>
                <div className="mt-1 text-xs text-muted">Сервер: {selectedKeyDetails?.server_name || '—'}</div>
                <div className="mt-1 text-xs text-muted">Статус: {selectedKeyDetails?.is_active ? 'Активен' : 'Истек'}</div>
                <div className="mt-1 text-xs text-muted">Истекает: {fmtDate(selectedKeyDetails?.expires_at)}</div>

                <div className="mt-4 rounded-2xl border border-white/10 bg-surfaceSoft/60 p-3">
                  <div className="text-xs text-muted">Название ключа</div>
                  <input
                    value={keyNameDraft}
                    onChange={(event) => setKeyNameDraft(event.target.value)}
                    maxLength={30}
                    className="mt-2 w-full rounded-xl border border-white/10 bg-surface px-3 py-2 text-sm outline-none"
                    placeholder="Например: iPhone / Рабочий"
                  />
                  <button onClick={impact(() => saveKeyName(), 'medium')} disabled={busy} className="mt-3 w-full rounded-xl bg-accent px-3 py-2 text-sm font-semibold text-black disabled:opacity-50">
                    Сохранить название
                  </button>
                </div>

                <div className="mt-3 grid grid-cols-3 gap-2">
                  <button onClick={impact(() => refreshSelectedKeyDetails(), 'light')} className="rounded-xl border border-white/15 px-3 py-2 text-sm">Обновить</button>
                  <button onClick={impact(() => copyKeyLinkById(selectedKeyId))} className="rounded-xl border border-white/15 px-3 py-2 text-sm">Скопировать</button>
                  <button onClick={impact(() => { setSelectedKeyId(null); setSelectedKeyDetails(null); })} className="rounded-xl border border-white/15 px-3 py-2 text-sm">Закрыть</button>
                </div>
              </div>
            </div>
          )}
          {renderPaymentResultModal()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
